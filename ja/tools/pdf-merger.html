    <link rel="alternate" hreflang="en" href="https://smarttoolzai.com/tools/pdf-merger.html" />
    <link rel="alternate" hreflang="es" href="https://smarttoolzai.com/es/tools/pdf-merger.html" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../css/style.css" rel="stylesheet">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [{
        "@type": "Question",
        "name": "結合できるPDFの数に制限はありますか？",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "ブラウザのメモリに依存しますが、一般的な用途では制限なく結合できます。"
        }
      }]
    }
    </script>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/ja/">SmartToolzAI</a>
        </div>
    </nav>
    <main class="container my-5">
        <h1 class="mb-4">PDF結合</h1>
        <p>複数のPDFファイルをドラッグ＆ドロップで簡単に結合します。</p>
        
        <div id="dropzone" class="border p-5 text-center mb-4">
            ここに複数のPDFをドラッグ＆ドロップしてください
            <input type="file" id="pdfInput" class="d-none" accept=".pdf" multiple>
        </div>
        <button id="btnMerge" class="btn btn-primary w-100 mb-4">結合する</button>

        <section class="faq-section mt-5">
            <h2>よくある質問 (FAQ)</h2>
            <div class="accordion" id="faqAccordion">
                <div class="accordion-item">
                    <h3 class="accordion-header">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#faq1">
                            結合できるPDFの数に制限はありますか？
                        </button>
                    </h3>
                    <div id="faq1" class="accordion-collapse collapse show" data-bs-parent="#faqAccordion">
                        <div class="accordion-body">
                            ブラウザのメモリに依存しますが、一般的な用途では実質的に制限なく結合できます。
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="about-section mt-5">
            <h2>このツールについて</h2>
            <p>PDF結合ツールは、完全にローカル上で複数のPDFドキュメントを1つに統合するための無料ツールです。</p>
