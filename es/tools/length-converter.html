<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor de Longitud Gratis (Km a Millas, Metros a Pies) — SmartToolzAI</title>
    <meta name="description" content="Convierte kilómetros, millas, metros, pies y pulgadas al instante. 100% gratis.">
    <link rel="alternate" hreflang="en" href="https://smarttoolzai.com/tools/length-converter.html" />
    <link rel="alternate" hreflang="es" href="https://smarttoolzai.com/es/tools/length-converter.html" />
    <link rel="alternate" hreflang="pt" href="https://smarttoolzai.com/pt/tools/length-converter.html" />
    <link rel="alternate" hreflang="ja" href="https://smarttoolzai.com/ja/tools/length-converter.html" />
    <link rel="alternate" hreflang="de" href="https://smarttoolzai.com/de/tools/length-converter.html" />
    <link rel="alternate" hreflang="fr" href="https://smarttoolzai.com/fr/tools/length-converter.html" />
</head>
<body>
    <header>
        <nav>
            <a href="/es/index.html">Inicio</a>
        </nav>
    </header>
    <main>
        <h1>Convertidor de Longitud</h1>
        <div class="converter-box">
            <input type="number" id="inputValue" placeholder="Valor">
            <select id="inputUnit">
                <option value="km">Kilómetros</option>
                <option value="m">Metros</option>
                <option value="mi">Millas</option>
                <option value="ft">Pies</option>
                <option value="in">Pulgadas</option>
            </select>
            <span>a</span>
            <select id="outputUnit">
                <option value="mi">Millas</option>
                <option value="km">Kilómetros</option>
                <option value="m">Metros</option>
                <option value="ft">Pies</option>
                <option value="in">Pulgadas</option>
            </select>
            <button id="btnConvert">Convertir</button>
            <div id="outputResult">Resultado: -</div>
        </div>
        <section id="faq">
            <h2>Preguntas Frecuentes</h2>
            <script type="application/ld+json">
            {
              "@context": "https://schema.org",
              "@type": "FAQPage",
              "mainEntity": [{
                "@type": "Question",
                "name": "¿Qué unidades de longitud soporta?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Soporta conversiones entre kilómetros, metros, millas, pies y pulgadas al instante."
                }
              }]
            }
            </script>
        </section>
    </main>
    <script src="../../js/main.js"></script>
    <script src="../../js/tools/length-converter.js"></script>
</body>
</html>
