<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Palabras Gratis Online (Tiempo Real) — SmartToolzAI</title>
    <meta name="description" content="Cuenta palabras, caracteres y párrafos en tiempo real. Analiza densidad de palabras clave. 100% gratis.">
    <link rel="alternate" hreflang="en" href="https://smarttoolzai.com/tools/word-counter.html" />
    <link rel="alternate" hreflang="es" href="https://smarttoolzai.com/es/tools/word-counter.html" />
    <link rel="alternate" hreflang="pt" href="https://smarttoolzai.com/pt/tools/word-counter.html" />
    <link rel="alternate" hreflang="ja" href="https://smarttoolzai.com/ja/tools/word-counter.html" />
    <link rel="alternate" hreflang="de" href="https://smarttoolzai.com/de/tools/word-counter.html" />
    <link rel="alternate" hreflang="fr" href="https://smarttoolzai.com/fr/tools/word-counter.html" />
</head>
<body>
    <header>
        <nav>
            <a href="/es/index.html">Inicio</a>
        </nav>
    </header>
    <main>
        <h1>Contador de Palabras</h1>
        <textarea id="textInput" placeholder="Escribe o pega tu texto aquí..."></textarea>
        <div id="stats">
            <span id="wordCount">Palabras: 0</span>
            <span id="charCount">Caracteres: 0</span>
            <span id="paragraphCount">Párrafos: 0</span>
        </div>
        <section id="faq">
            <h2>Preguntas Frecuentes</h2>
            <script type="application/ld+json">
            {
              "@context": "https://schema.org",
              "@type": "FAQPage",
              "mainEntity": [{
                "@type": "Question",
                "name": "¿El contador funciona en tiempo real?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Sí, las estadísticas se actualizan automáticamente a medida que escribes o pegas texto."
                }
              }]
            }
            </script>
        </section>
    </main>
    <script src="../../js/main.js"></script>
    <script src="../../js/tools/word-counter.js"></script>
</body>
</html>
